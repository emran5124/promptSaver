name: Build PromptVault APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ جایگزین کامل Gradle Wrapper (حل مشکل GradleWrapperMain)
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      # 🔥 فقط build tools لازم
      - name: Install Android SDK components
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      # 🧹 جلوگیری از خراب شدن icon ها
      - name: Fix broken resources (safe mode)
        run: |
          sudo apt-get update
          sudo apt-get install -y pngcheck imagemagick

          find app/src/main/res -name "*.png" | while read f; do
            if ! pngcheck "$f" >/dev/null 2>&1; then
              echo "Fixing broken PNG: $f"
              rm -f "$f"

              convert -size 512x512 xc:"#111111" \
                -gravity center \
                -fill white \
                -pointsize 120 \
                -annotate 0 "PV" \
                PNG32:"$f"
            fi
          done

      - name: Clean
        run: ./gradlew clean

      # 🔥 Debug APK (اصلی)
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      # ❌ Release بدون keystore = debug-signed (مشکل تو حل شد)
      - name: Build Release APK (debug signed)
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version
        id: ver
        run: |
          V=$(grep 'versionName' app/build.gradle | grep -o '".*"' | tr -d '"')
          echo "name=$V" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: debug-${{ steps.ver.outputs.name }}
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ steps.ver.outputs.name }}
          path: app/build/outputs/apk/release/app-release.apk