name: Build PromptVault APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build:
    name: Build Debug & Release APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK (debug-signed for personal use)
        run: ./gradlew assembleRelease --stacktrace

      - name: Get version info
        id: version
        run: |
          VERSION_CODE=$(grep 'versionCode' app/build.gradle | tr -dc '0-9')
          VERSION_NAME=$(grep 'versionName' app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          echo "version_code=$VERSION_CODE" >> $GITHUB_OUTPUT
          echo "version_name=$VERSION_NAME" >> $GITHUB_OUTPUT
          echo "date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT

      - name: Rename APKs
        run: |
          mkdir -p artifacts
          cp app/build/outputs/apk/debug/app-debug.apk \
             artifacts/PromptVault-v${{ steps.version.outputs.version_name }}-debug.apk
          cp app/build/outputs/apk/release/app-release.apk \
             artifacts/PromptVault-v${{ steps.version.outputs.version_name }}-release.apk

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PromptVault-Debug-v${{ steps.version.outputs.version_name }}
          path: artifacts/PromptVault-v${{ steps.version.outputs.version_name }}-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PromptVault-Release-v${{ steps.version.outputs.version_name }}
          path: artifacts/PromptVault-v${{ steps.version.outputs.version_name }}-release.apk
          retention-days: 90

      # Optional: Auto-create GitHub Release on version tag (e.g. git tag v1.0)
      - name: Create GitHub Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/PromptVault-v${{ steps.version.outputs.version_name }}-debug.apk
            artifacts/PromptVault-v${{ steps.version.outputs.version_name }}-release.apk
          body: |
            ## PromptVault v${{ steps.version.outputs.version_name }}
            ساخته شده در تاریخ ${{ steps.version.outputs.date }}
            
            ### نصب
            فایل APK را دانلود کرده و روی دستگاه اندروید خود نصب کنید.
            (در صورت نیاز، "نصب از منابع ناشناس" را در تنظیمات فعال کنید)
