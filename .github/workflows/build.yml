name: Build PromptVault APK3

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ✅ FIX: Android SDK واقعی (بدون setup-android)
      - name: Setup Android SDK (stable)
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip

          export ANDROID_SDK_ROOT=$HOME/android-sdk
          mkdir -p $ANDROID_SDK_ROOT/cmdline-tools

          wget -q https://dl.google.com/android/repository/commandlinetools-linux-11076708_latest.zip -O cmdline.zip

          unzip -q cmdline.zip -d $ANDROID_SDK_ROOT/cmdline-tools

          mv $ANDROID_SDK_ROOT/cmdline-tools/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest

          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT" >> $GITHUB_ENV
          echo "$ANDROID_SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH
          echo "$ANDROID_SDK_ROOT/platform-tools" >> $GITHUB_PATH

      # ✅ licenses (الان sdkmanager واقعی وجود دارد)
      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      # ✅ install SDK packages
      - name: Install required SDK components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0"

      # (اختیاری ولی بهتر)
      - name: Make gradlew executable
        run: chmod +x gradlew

      # 🔥 cache
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # 🔥 FIX ICONS (بدون crash)
      - name: Safe resource sanitizer
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick pngcheck

          for f in app/src/main/res/mipmap-*/ic_launcher*.png; do
            if [ -f "$f" ]; then
              if ! pngcheck "$f" >/dev/null 2>&1; then
                echo "Broken PNG removed: $f"
                rm -f "$f"

                convert -size 512x512 xc:"#121212" \
                  -gravity center \
                  -fill white \
                  -pointsize 120 \
                  -annotate 0 "PV" \
                  PNG32:"$f"
              fi
            fi
          done

      # 🔥 fallback adaptive icon (safe XML)
      - name: Ensure adaptive icon exists
        run: |
          mkdir -p app/src/main/res/mipmap-anydpi-v26
          mkdir -p app/src/main/res/drawable

          cat > app/src/main/res/drawable/ic_launcher_foreground.xml <<'EOF'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp"
              android:height="108dp"
              android:viewportWidth="108"
              android:viewportHeight="108">

              <path
                  android:fillColor="#121212"
                  android:pathData="M0,0h108v108h-108z"/>

              <path
                  android:fillColor="#FFFFFF"
                  android:pathData="M30,30h48v48h-48z"/>
          </vector>
          EOF

          cat > app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml <<'EOF'
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@android:color/black"/>
              <foreground android:drawable="@drawable/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

      # 🔥 build (بدون dependency به ANDROID_HOME)
      - name: Clean project
        run: ./gradlew clean

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build Release APK
        run: ./gradlew assembleRelease --stacktrace

      # version
      - name: Get version name
        id: ver
        run: |
          V=$(grep 'versionName' app/build.gradle | grep -o '".*"' | tr -d '"')
          echo "name=$V" >> $GITHUB_OUTPUT

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: PromptVault-v${{ steps.ver.outputs.name }}-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: PromptVault-v${{ steps.ver.outputs.name }}-release
          path: app/build/outputs/apk/release/app-release.apk
          retention-days: 90

      - name: Create Release on tag
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            app/build/outputs/apk/debug/app-debug.apk
            app/build/outputs/apk/release/app-release.apk